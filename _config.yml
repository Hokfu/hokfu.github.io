about_content: | # this will include new lines to allow paragraphs
  Hi, my name is Khant Htoo Naing. I am from Myanmar. I am currently studying IT in Thailand.<br>
  I'm passionate about using data to solve problems, and that's what drew me to machine learning and AI.
  I enjoy exploring and inspecting through data and find solutions in it. 

  I am particularly interested in <mark>Machine Learning</mark> and <mark>Deep Learning</mark> with <mark>Python</mark>. 
  I am also interested in <mark>Computer Vision</mark> and <mark>Natural Language Processing</mark>. I am familiar and have done projects with <mark>PyTorch</mark> and <mark>TensorFlow</mark> libraries and understand their workflows. 
  To further my skills, I'm currently diving into AWS and its functionalities. My ultimate goal is to become a professional in the field of AI and machine learning, making a real impact with these powerful technologies.
